version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: gpt_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: gpt_db
    ports:
      - '5432:5432'
    volumes:
      - gpt_pgdata:/var/lib/postgresql/data

volumes:
  gpt_pgdata:
